<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
  :root {
    --bg: #0a0a0a;
    --fade-ms: 1200;
    --slide-seconds: 5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    cursor: none;
  }
  body:hover, body:focus-within { cursor: default; }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #stage img.layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }
  #stage img.layer.visible {
    opacity: 1;
  }

  #hint {
    position: fixed;
    bottom: 14px;
    right: 18px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 0.02em;
    transition: opacity 0.4s;
  }
  #hint.hidden { opacity: 0; }

  #imageCounter {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 6;
    color: rgba(255,255,255,0.5);
    font-size: 2vmin;
    letter-spacing: 0.02em;
  }
  body.overview-open #imageCounter { display: none; }

  #latestBtn {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 20;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  @media (hover: hover) {
    #latestBtn:hover { background: rgba(255,255,255,0.26); }
  }

  #gridBtn {
    position: fixed;
    top: 84px;
    left: 18px;
    z-index: 20;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  @media (hover: hover) {
    #gridBtn:hover { background: rgba(255,255,255,0.26); }
  }

  #fitGridBtn {
    position: fixed;
    top: 150px;
    left: 18px;
    z-index: 20;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  @media (hover: hover) {
    #fitGridBtn:hover { background: rgba(255,255,255,0.26); }
  }

  #playPauseBtn {
    position: fixed;
    top: 216px;
    left: 18px;
    z-index: 20;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  @media (hover: hover) {
    #playPauseBtn:hover { background: rgba(255,255,255,0.26); }
  }

  #delayBox {
    position: fixed;
    top: 282px;
    left: 18px;
    z-index: 20;
    width: 56px;
    height: 56px;
  }
  #delayInput {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.9);
    text-align: center;
    font-size: 18px;
    font-family: inherit;
    -moz-appearance: textfield;
  }
  #delayInput::-webkit-outer-spin-button,
  #delayInput::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  #delayInput:focus {
    outline: 2px solid rgba(255,255,255,0.5);
  }

  #playPauseBtn, #gridBtn, #fitGridBtn, #delayBox, #latestBtn {
    transition: opacity 0.3s;
  }
  body.hide-controls #playPauseBtn,
  body.hide-controls #gridBtn,
  body.hide-controls #fitGridBtn,
  body.hide-controls #delayBox,
  body.hide-controls #latestBtn {
    opacity: 0;
    pointer-events: none;
  }

  body.overview-open #playPauseBtn,
  body.overview-open #gridBtn,
  body.overview-open #fitGridBtn,
  body.overview-open #delayInput,
  body.overview-open #latestBtn {
    background: rgba(20,20,20,0.55);
  }
  body.overview-open #playPauseBtn:hover,
  body.overview-open #gridBtn:hover,
  body.overview-open #fitGridBtn:hover,
  body.overview-open #latestBtn:hover {
    background: rgba(20,20,20,0.75);
  }

  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.4);
    font-size: 18px;
  }

  #mainLoadingIndicator {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    background: rgba(20,20,20,0.55);
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 6;
  }
  #mainLoadingIndicator.visible { display: flex; }
  #mainLoadingIndicator .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: thumbspin 0.8s linear infinite;
  }

  #overview {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.97);
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(13.95vw, 13.95vw));
    grid-auto-rows: 13.95vw;
    justify-content: start;
    align-content: start;
    gap: 0.15vw;
    padding: 0.15vw;
    overflow-y: auto;
    z-index: 10;
  }
  #overview.open { display: grid; }
  #overview.fit {
    overflow: hidden;
    align-content: stretch;
    align-items: stretch;
  }
  #overview.fit .thumb {
    padding-top: 0;
  }
  #overview.fit .thumb:hover img {
    transform: scale(1.06);
  }
  #overview .thumb {
    position: relative;
    width: 100%;
    padding-top: 100%;
    overflow: hidden;
    cursor: pointer;
    background: #111;
  }
  #overview .thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  #overview .thumb:hover img { transform: scale(1.06); }
  #overview .thumb.loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 22px;
    height: 22px;
    margin: -11px 0 0 -11px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.65);
    border-radius: 50%;
    animation: thumbspin 0.8s linear infinite;
  }
  @keyframes thumbspin { to { transform: rotate(360deg); } }

  #overview .thumb.current {
    outline: 3px solid rgba(255,255,255,0.85);
    outline-offset: -3px;
  }

  @keyframes thumbFlash {
    0% { transform: scale(1); }
    30% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  #overview .thumb.flash {
    animation: thumbFlash 1.5s ease-out;
    z-index: 5; /* render above neighboring thumbnails while enlarged */
  }

  @keyframes thumbFlashFit {
    0% { transform: scale(1); }
    30% { transform: scale(0.8); }
    100% { transform: scale(1); }
  }
  #overview.fit .thumb.flash {
    animation: thumbFlashFit 1.5s ease-out;
  }

  .view-btn {
    outline: none;
  }
  .view-btn.active {
    box-shadow: 0 0 0 0.15vmin rgba(255,255,255,0.85);
  }

  @media (max-width: 768px), (orientation: portrait) {
    body.hide-controls #playPauseBtn,
    body.hide-controls #gridBtn,
    body.hide-controls #fitGridBtn,
    body.hide-controls #delayBox,
    body.hide-controls #latestBtn {
      opacity: 1;
      pointer-events: auto;
    }

    #overview {
      grid-template-columns: repeat(auto-fill, minmax(24.55vw, 24.55vw));
      grid-auto-rows: 24.55vw;
    }

    #playPauseBtn, #gridBtn, #fitGridBtn, #delayBox, #delayInput, #latestBtn {
      width: 112px;
      height: 112px;
    }
    #latestBtn { top: 18px; left: 18px; }
    #gridBtn { top: 140px; left: 18px; }
    #fitGridBtn { top: 262px; left: 18px; }
    #playPauseBtn { top: 384px; left: 18px; }
    #delayBox { top: 506px; left: 18px; }
    #playPauseBtn svg, #gridBtn svg, #fitGridBtn svg, #latestBtn svg {
      width: 52px;
      height: 52px;
    }
    #delayInput { font-size: 36px; }
  }
</style>
</head>
<body tabindex="0">
  <div id="stage">
    <img class="layer" id="imgA">
    <img class="layer" id="imgB">
    <div id="empty">Waiting for images…</div>
    <div id="mainLoadingIndicator"><span class="spinner"></span> Loading new image…</div>
  </div>
  <button id="latestBtn" class="view-btn" aria-label="Show latest photo">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 7.1-1.01L12 2z" fill="currentColor"/>
    </svg>
  </button>
  <button id="playPauseBtn" class="view-btn" aria-label="Play or pause slideshow">
    <svg id="iconPlay" viewBox="0 0 24 24" width="26" height="26"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
    <svg id="iconPause" viewBox="0 0 24 24" width="26" height="26" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
  </button>
  <button id="gridBtn" class="view-btn" aria-label="Toggle overview grid">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <rect x="4" y="4" width="7" height="7" fill="currentColor"/>
      <rect x="13" y="4" width="7" height="7" fill="currentColor"/>
      <rect x="4" y="13" width="7" height="7" fill="currentColor"/>
      <rect x="13" y="13" width="7" height="7" fill="currentColor"/>
    </svg>
  </button>
  <button id="fitGridBtn" class="view-btn" aria-label="Toggle fit-to-screen overview">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <rect x="3" y="3" width="5" height="5" fill="currentColor"/>
      <rect x="9.5" y="3" width="5" height="5" fill="currentColor"/>
      <rect x="16" y="3" width="5" height="5" fill="currentColor"/>
      <rect x="3" y="9.5" width="5" height="5" fill="currentColor"/>
      <rect x="9.5" y="9.5" width="5" height="5" fill="currentColor"/>
      <rect x="16" y="9.5" width="5" height="5" fill="currentColor"/>
      <rect x="3" y="16" width="5" height="5" fill="currentColor"/>
      <rect x="9.5" y="16" width="5" height="5" fill="currentColor"/>
      <rect x="16" y="16" width="5" height="5" fill="currentColor"/>
    </svg>
  </button>
  <div id="delayBox">
    <input id="delayInput" type="number" min="1" step="1" value="3" aria-label="Seconds per image">
  </div>
  <div id="hint">Tab: cycle views · Space: pause · ←/→: navigate</div>
  <div id="imageCounter"></div>
  <div id="overview"></div>

<script>
const POLL_MS = 4000;
let SLIDE_MS = 3000;

let images = [];
let currentIndex = -1;
let activeLayer = 0;
let paused = false;
let advanceTimer = null;
let hintTimer = null;
let fitMode = false;
let latestMode = false;
let savedSlideshowIndex = null;
let lastOverviewSignature = null;
let lastMouseX = -9999;
let lastMouseY = -9999;
const CORNER_THRESHOLD = 260;

function updateControlsVisibility() {
  if (!overview.classList.contains('open')) {
    document.body.classList.remove('hide-controls');
    return;
  }
  const near = lastMouseX < CORNER_THRESHOLD && lastMouseY < CORNER_THRESHOLD;
  document.body.classList.toggle('hide-controls', !near);
}

document.addEventListener('mousemove', (e) => {
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  updateControlsVisibility();
});

document.addEventListener('click', (e) => {
  if (latestMode) return; // latest view is passive — nothing happens on click
  if (e.target.closest('#playPauseBtn, #gridBtn, #fitGridBtn, #delayBox, #latestBtn')) return;
  if (e.clientX < CORNER_THRESHOLD && e.clientY < CORNER_THRESHOLD) return;
  if (e.target.closest('.thumb')) return;
  handlePlayPauseAction();
});

let touchStartX = null;
let touchStartY = null;
const SWIPE_THRESHOLD = 50;

document.addEventListener('touchstart', (e) => {
  if (overview.classList.contains('open')) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (touchStartX === null || overview.classList.contains('open')) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  touchStartX = null;
  if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) advance(1);
    else advance(-1);
  }
}, { passive: true });

function computeFitGrid(n) {
  if (n <= 0) return { columns: 1, rows: 1 };
  const aspect = window.innerWidth / window.innerHeight;
  let columns = Math.max(1, Math.round(Math.sqrt(n * aspect)));
  let rows = Math.ceil(n / columns);
  while (columns > 1 && Math.ceil(n / (columns - 1)) === rows) {
    columns -= 1;
  }
  return { columns, rows };
}

const imgA = document.getElementById('imgA');
const imgB = document.getElementById('imgB');
const emptyMsg = document.getElementById('empty');
const mainLoadingIndicator = document.getElementById('mainLoadingIndicator');
const overview = document.getElementById('overview');
const hint = document.getElementById('hint');
const imageCounter = document.getElementById('imageCounter');

function updateImageCounter() {
  imageCounter.textContent = images.length === 0 ? '' : `${currentIndex + 1} / ${images.length}`;
}
const playPauseBtn = document.getElementById('playPauseBtn');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const gridBtn = document.getElementById('gridBtn');
const fitGridBtn = document.getElementById('fitGridBtn');
const latestBtn = document.getElementById('latestBtn');
const delayInput = document.getElementById('delayInput');

function layers() { return [imgA, imgB]; }
imgA.fetchPriority = 'high';
imgB.fetchPriority = 'high';

function robustLoadImage(imgEl, url, { maxAttempts = 30, retryDelay = 1000, onSettled, onRetrying } = {}) {
  const token = Symbol();
  imgEl._loadToken = token;
  let attempt = 0;
  function tryOnce() {
    if (imgEl._loadToken !== token) return;
    attempt++;
    const target = attempt === 1
      ? url
      : url + (url.includes('?') ? '&' : '?') + '_retry=' + attempt + '_' + Date.now();

    const handleLoad = () => {
      if (imgEl._loadToken !== token) { cleanup(); return; }
      cleanup();
      if (onSettled) onSettled(true);
    };
    const handleError = () => {
      cleanup();
      if (imgEl._loadToken !== token) return;
      imgEl.removeAttribute('src');
      if (attempt < maxAttempts) {
        if (onRetrying) onRetrying(attempt);
        setTimeout(tryOnce, retryDelay);
      } else if (onSettled) {
        onSettled(false);
      }
    };
    function cleanup() {
      imgEl.removeEventListener('load', handleLoad);
      imgEl.removeEventListener('error', handleError);
    }
    imgEl.addEventListener('load', handleLoad, { once: true });
    imgEl.addEventListener('error', handleError, { once: true });
    imgEl.src = target;
  }
  tryOnce();
}

const MAX_CONCURRENT_THUMB_LOADS = 4;
let thumbQueue = [];
let activeThumbLoads = 0;

function pumpThumbQueue() {
  while (activeThumbLoads < MAX_CONCURRENT_THUMB_LOADS && thumbQueue.length > 0) {
    const { imgEl, thumbUrl, fullUrl } = thumbQueue.shift();
    if (!imgEl.isConnected) continue;
    activeThumbLoads++;
    imgEl.closest('.thumb')?.classList.add('loading');
    loadThumbWithFallback(imgEl, thumbUrl, fullUrl, () => {
      imgEl.closest('.thumb')?.classList.remove('loading');
      activeThumbLoads--;
      pumpThumbQueue();
    });
  }
}

function cancelPendingThumbLoads() {
  thumbQueue = [];
  overview.querySelectorAll('img').forEach(img => {
    if (!img.complete) img.src = '';
  });
  activeThumbLoads = 0;
}

function showImage(index, { restartTimer = true } = {}) {
  if (index < 0 || index >= images.length) return;
  currentIndex = index;
  const url = images[index];

  const incoming = layers()[1 - activeLayer];
  const outgoing = layers()[activeLayer];

  robustLoadImage(incoming, url, {
    onRetrying: () => mainLoadingIndicator.classList.add('visible'),
    onSettled: (ok) => {
      mainLoadingIndicator.classList.remove('visible');
      if (!ok) return;
      incoming.classList.add('visible');
      outgoing.classList.remove('visible');
      activeLayer = 1 - activeLayer;
    }
  });
  emptyMsg.style.display = 'none';

  updateOverviewHighlight();
  updateImageCounter();
  if (restartTimer) resetAdvanceTimer();
}

function resetAdvanceTimer() {
  clearTimeout(advanceTimer);
  if (paused || overview.classList.contains('open') || latestMode) return;
  advanceTimer = setTimeout(advance, SLIDE_MS);
}

function advance(step = 1) {
  if (images.length === 0) return;
  const next = (currentIndex + step + images.length) % images.length;
  showImage(next);
}

const BUCKET_BASE_URL = 'https://uvsheetlivestream.nyc3.digitaloceanspaces.com/';
const MANIFEST_URL = BUCKET_BASE_URL + 'images.json';
const LOCAL_API_URL = 'http://localhost:8000/api/images';
const useLocalSource = new URLSearchParams(window.location.search).get('source') === 'local';

async function fetchImageList() {
  if (useLocalSource) {
    const res = await fetch(LOCAL_API_URL, { cache: 'no-store' });
    return await res.json();
  }
  const res = await fetch(MANIFEST_URL, { cache: 'no-store' });
  const filenames = await res.json();
  return filenames.map(name => BUCKET_BASE_URL + name);
}

async function pollImages() {
  try {
    const list = await fetchImageList();
    const currentName = images[currentIndex];
    const grew = list.length > images.length;
    images = list;

    if (images.length === 0) {
      emptyMsg.style.display = 'flex';
      currentIndex = -1;
      updateImageCounter();
      return;
    }
    if (currentIndex === -1) {
      showImage(images.length - 1);
    } else if (grew && !overview.classList.contains('open')) {
      showImage(images.length - 1);
    } else {
      const idx = images.indexOf(currentName);
      currentIndex = idx === -1 ? Math.min(currentIndex, images.length - 1) : idx;
    }
    updateImageCounter();
    if (overview.classList.contains('open')) {
      const signature = images.join('|');
      if (signature !== lastOverviewSignature) {
        renderOverview();
        lastOverviewSignature = signature;
      } else {
        updateOverviewHighlight();
      }
    }
  } catch (e) {
    console.error('poll failed', e);
  }
}

function selectFromOverview(i) {
  currentIndex = i;
  const url = images[i];
  cancelPendingThumbLoads();
  const incoming = layers()[1 - activeLayer];
  const outgoing = layers()[activeLayer];

  robustLoadImage(incoming, url, {
    onSettled: (ok) => {
      if (!ok) { closeOverview(); return; }
      incoming.style.transition = 'none';
      outgoing.style.transition = 'none';
      incoming.classList.add('visible');
      outgoing.classList.remove('visible');
      activeLayer = 1 - activeLayer;
      void incoming.offsetWidth;
      incoming.style.transition = '';
      outgoing.style.transition = '';

      updateOverviewHighlight();
      updateImageCounter();
      closeOverview();
      setPaused(true); // land on the selected image, paused
    }
  });
}

function toThumbnailUrl(url) {
  return url.replace(/(\.[a-zA-Z0-9]+)(\?.*)?$/, '_thumbnail$1$2');
}

function loadThumbWithFallback(imgEl, thumbUrl, fullUrl, onSettled) {
  robustLoadImage(imgEl, thumbUrl, {
    maxAttempts: 3,
    retryDelay: 1000,
    onSettled: (ok) => {
      if (ok) {
        if (onSettled) onSettled(true);
      } else {
        robustLoadImage(imgEl, fullUrl, {
          maxAttempts: 20,
          retryDelay: 1200,
          onSettled
        });
      }
    }
  });
}

function renderOverview() {
  overview.innerHTML = '';
  if (fitMode) {
    const { columns, rows } = computeFitGrid(images.length);
    overview.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
    overview.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  } else {
    overview.style.gridTemplateColumns = '';
    overview.style.gridTemplateRows = '';
  }
  images.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'thumb' + (i === currentIndex ? ' current' : '');
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.fetchPriority = 'low';
    div.appendChild(img);
    div.addEventListener('click', () => {
      selectFromOverview(i);
    });
    overview.appendChild(div);
    if (fitMode) {
      thumbQueue.push({ imgEl: img, thumbUrl: toThumbnailUrl(name), fullUrl: name });
    } else {
      div.classList.add('loading');
      loadThumbWithFallback(img, toThumbnailUrl(name), name, () => div.classList.remove('loading'));
    }
  });
  if (fitMode) pumpThumbQueue();
}

function updateOverviewHighlight() {
  if (!overview.classList.contains('open')) return;
  overview.querySelectorAll('.thumb').forEach((el, i) => {
    el.classList.toggle('current', i === currentIndex);
  });
}

function updateActiveViewButton() {
  [latestBtn, gridBtn, fitGridBtn, playPauseBtn].forEach(btn => btn.classList.remove('active'));
  let activeBtn;
  if (latestMode) {
    activeBtn = latestBtn;
  } else if (overview.classList.contains('open')) {
    activeBtn = fitMode ? fitGridBtn : gridBtn;
  } else {
    activeBtn = playPauseBtn;
  }
  activeBtn.classList.add('active');
}

function syncUrlState() {
  updateActiveViewButton();
  const params = new URLSearchParams(window.location.search);
  if (latestMode) {
    params.set('view', 'latest');
  } else if (overview.classList.contains('open')) {
    params.set('view', fitMode ? 'full_grid' : 'scrollable_grid');
  } else {
    params.set('view', 'slideshow');
  }
  params.set('duration', SLIDE_MS / 1000);
  const newUrl = window.location.pathname + '?' + params.toString();
  history.replaceState(null, '', newUrl);
}

function openOverview(fit) {
  if (latestMode && savedSlideshowIndex !== null) {
    showImage(savedSlideshowIndex, { restartTimer: false }); // restore, don't leave it stuck on the latest photo
    savedSlideshowIndex = null;
  }
  latestMode = false;
  fitMode = !!fit;
  overview.classList.toggle('fit', fitMode);
  renderOverview();
  lastOverviewSignature = images.join('|');
  overview.classList.add('open');
  document.body.classList.add('overview-open');
  clearTimeout(advanceTimer);
  updateControlsVisibility();
  syncUrlState();
  const currentThumb = overview.querySelector('.thumb.current');
  if (currentThumb) {
    if (!fitMode) currentThumb.scrollIntoView({ block: 'center' });
    currentThumb.classList.remove('flash');
    void currentThumb.offsetWidth; // force reflow so the animation restarts if triggered again
    currentThumb.classList.add('flash');
  }
}

function closeOverview() {
  overview.classList.remove('open');
  document.body.classList.remove('overview-open');
  cancelPendingThumbLoads();
  resetAdvanceTimer();
  updateControlsVisibility();
  syncUrlState();
}

function enterLatestView() {
  if (overview.classList.contains('open')) {
    overview.classList.remove('open');
    document.body.classList.remove('overview-open');
    cancelPendingThumbLoads();
  }
  if (!latestMode) {
    savedSlideshowIndex = currentIndex; // remember where the slideshow was, to resume there later
  }
  latestMode = true;
  clearTimeout(advanceTimer);
  if (images.length > 0) {
    showImage(images.length - 1, { restartTimer: false });
  }
  updateControlsVisibility();
  syncUrlState();
}

function exitLatestViewToSlideshow() {
  latestMode = false;
  if (savedSlideshowIndex !== null && savedSlideshowIndex >= 0 && savedSlideshowIndex < images.length) {
    showImage(savedSlideshowIndex, { restartTimer: false });
  }
  savedSlideshowIndex = null;
  resetAdvanceTimer();
  updateControlsVisibility();
  syncUrlState();
}

function toggleOverview(fit) {
  const wantFit = !!fit;
  if (overview.classList.contains('open')) {
    if (fitMode !== wantFit) {
      openOverview(wantFit);
    } else {
      closeOverview();
    }
  } else {
    openOverview(wantFit);
  }
}

window.addEventListener('resize', () => {
  if (fitMode && overview.classList.contains('open')) renderOverview();
});

function flashHint() {
  hint.classList.remove('hidden');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hint.classList.add('hidden'), 3000);
}

function setPaused(newPaused) {
  paused = newPaused;
  iconPlay.style.display = paused ? 'block' : 'none';
  iconPause.style.display = paused ? 'none' : 'block';
  if (paused) {
    clearTimeout(advanceTimer);
  } else {
    resetAdvanceTimer();
  }
}

function togglePause() {
  setPaused(!paused);
}

function handlePlayPauseAction() {
  if (overview.classList.contains('open')) {
    setPaused(false);
    closeOverview();
  } else {
    togglePause();
  }
}

playPauseBtn.addEventListener('click', () => {
  if (latestMode) {
    exitLatestViewToSlideshow();
  } else {
    handlePlayPauseAction();
  }
});
gridBtn.addEventListener('click', () => toggleOverview(false));
fitGridBtn.addEventListener('click', () => toggleOverview(true));
latestBtn.addEventListener('click', enterLatestView);

delayInput.addEventListener('input', () => {
  const seconds = parseFloat(delayInput.value);
  if (!isFinite(seconds) || seconds <= 0) return;
  SLIDE_MS = seconds * 1000;
  resetAdvanceTimer();
  syncUrlState();
});

function cycleView() {
  if (!overview.classList.contains('open') && !latestMode) {
    enterLatestView();       // slideshow -> latest
  } else if (latestMode) {
    openOverview(false);     // latest -> scrollable grid
  } else if (!fitMode) {
    openOverview(true);      // scrollable grid -> fit-to-viewport grid
  } else {
    closeOverview();         // fit-to-viewport grid -> back to slideshow
  }
}

document.addEventListener('keydown', (e) => {
  if (document.activeElement === delayInput) return;
  if (e.key === 'Tab') {
    e.preventDefault();
    cycleView();
  } else if (e.key === ' ') {
    e.preventDefault();
    if (!latestMode) handlePlayPauseAction();
  } else if (e.key === 'ArrowRight') {
    advance(1);
  } else if (e.key === 'ArrowLeft') {
    advance(-1);
  } else if (e.key === 'Home' && overview.classList.contains('open') && !fitMode) {
    e.preventDefault();
    overview.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (e.key === 'End' && overview.classList.contains('open') && !fitMode) {
    e.preventDefault();
    overview.scrollTo({ top: overview.scrollHeight, behavior: 'smooth' });
  } else if (e.key === 'Escape') {
    closeOverview();
  }
  flashHint();
});

document.addEventListener('mousemove', flashHint);
flashHint();

(function applyUrlParams() {
  const params = new URLSearchParams(window.location.search);

  const duration = parseFloat(params.get('duration'));
  if (isFinite(duration) && duration > 0) {
    SLIDE_MS = duration * 1000;
    delayInput.value = duration;
  }

  const view = params.get('view');
  if (view === 'full_grid') {
    openOverview(true);
  } else if (view === 'scrollable_grid') {
    openOverview(false);
  } else if (view === 'latest') {
    enterLatestView();
  } else if (view === null) {
    enterLatestView(); // no ?view= at all -> default to the latest view
  }
  // view === 'slideshow' explicitly: stay in the default slideshow, nothing to do
})();

syncUrlState();

setPaused(false);

pollImages();
setInterval(pollImages, POLL_MS);
</script>
